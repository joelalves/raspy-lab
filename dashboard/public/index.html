<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Server Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Applied before first paint to avoid a flash of the wrong theme on load.
    // Dark is the default; the toggle button's explicit choice (if any) wins.
    (function () {
      var stored = localStorage.getItem('raspy-dashboard-theme');
      document.documentElement.setAttribute('data-theme', stored || 'dark');
    })();
  </script>
</head>
<body>
  <div id="app">
    <header>
      <h1>Server Dashboard</h1>
      <div id="overall-badge">
        <span id="agent-badge">
          <span class="dot good" id="agent-dot"></span>Agent <small id="agent-text"></small>
        </span>
        <span id="radio-badge" class="hidden">
          📻 <span id="radio-station-name"></span>
          <button id="radio-vol-down" class="radio-btn" title="Volume down">−</button>
          <span id="radio-vol-pct"></span>
          <button id="radio-vol-up" class="radio-btn" title="Volume up">+</button>
          <button id="radio-mute-btn" class="radio-btn" title="Mute/unmute">🔊</button>
          <button id="radio-stop-btn" class="radio-btn" title="Stop">⏹</button>
        </span>
        <span class="dot good" id="overall-dot"></span><span id="overall-text">loading…</span>
        <button id="theme-btn" title="Toggle dark mode">🌙</button>
        <button id="refresh-btn" title="Refresh now">⟳</button>
      </div>
    </header>
    <div class="layout">
      <nav>
        <button data-view="overview" class="active"><span>Overview</span><small id="badge-overview"></small></button>
        <button data-view="system"><span>System</span><small id="badge-system"></small></button>
        <button data-view="weather"><span>Weather</span><small id="badge-weather"></small></button>
        <button data-view="pihole"><span>Pi-hole</span><small id="badge-pihole"></small></button>
        <button data-view="docker"><span>Docker</span><small id="badge-docker"></small></button>
        <button data-view="jenkins"><span>Jenkins</span><small id="badge-jenkins"></small></button>
        <button data-view="sonarqube"><span>SonarQube</span><small id="badge-sonarqube"></small></button>
        <button data-view="shelly"><span>Shelly</span><small id="badge-shelly"></small></button>
        <button data-view="radio"><span>Radio</span><small id="badge-radio"></small></button>
      </nav>
      <main>
        <section id="view-overview" class="view active"></section>
        <section id="view-system" class="view"></section>
        <section id="view-weather" class="view"></section>
        <section id="view-pihole" class="view"></section>
        <section id="view-docker" class="view"></section>
        <section id="view-jenkins" class="view"></section>
        <section id="view-sonarqube" class="view"></section>
        <section id="view-shelly" class="view"></section>
        <section id="view-radio" class="view"></section>
      </main>
    </div>
    <footer id="updated-at">—</footer>
    <div id="log-modal" class="log-modal hidden">
      <div class="log-modal-content">
        <div class="log-modal-header">
          <span id="log-modal-title"></span>
          <button id="log-modal-close" title="Close">✕</button>
        </div>
        <pre id="log-modal-body"></pre>
      </div>
    </div>
    <audio id="radio-audio" preload="none"></audio>
  </div>
  <script src="app.js"></script>
</body>
</html>
